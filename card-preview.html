<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>扑克牌「点数+花色」呈现方式预览</title>
<style>
  body { background:#160d11; color:#eee; font-family: system-ui, -apple-system, "PingFang SC", sans-serif; padding:28px; margin:0; }
  h1 { text-align:center; color:#d4af37; font-weight:800; letter-spacing:2px; }
  .sub { text-align:center; color:#b79b6b; margin:6px 0 26px; font-size:14px; }
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap:22px 18px; max-width:1080px; margin:0 auto; }
  .cell { text-align:center; }
  .nm { color:#d4af37; font-size:13px; font-weight:600; margin-top:10px; min-height:34px; }
  .ds { color:#8a7a63; font-size:11px; margin-top:2px; }
  .row { display:flex; gap:10px; justify-content:center; }
  .card { width:84px; height:118px; border-radius:9px; position:relative; box-shadow:0 6px 14px rgba(0,0,0,.45); background:#fbf7ee; border:1px solid #ddd2b6; box-sizing:border-box; overflow:hidden; }
  .card.back { background:linear-gradient(135deg,#5c1a2e,#2e0a16); border:1px solid #d4af37; display:flex; align-items:center; justify-content:center; color:#d4af37; font-size:30px; }
</style>
</head>
<body>
<h1>扑克牌「点数 + 花色」8 种呈现方式</h1>
<div class="sub">重点看牌面上「点数和花色」怎么排、怎么画 —— 不是只换颜色</div>
<div class="grid" id="grid"></div>

<script>
const RED = "#c41e3a", BLK = "#1a1a1a", GOLD = "#d4af37";

// 每种 style: 返回牌面 innerHTML（rank 字符, suit 字符, c 颜色）
const styles = [
  { nm:"① 经典角标式", ds:"角标+中央大花色",
    f:(r,s,c)=>`<div style="position:absolute;top:5px;left:6px;font-size:17px;font-weight:800;color:${c};line-height:1">${r}<br>${s}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;color:${c}">${s}</div>
      <div style="position:absolute;bottom:5px;right:6px;font-size:17px;font-weight:800;color:${c};line-height:1;transform:rotate(180deg)">${r}<br>${s}</div>` },

  { nm:"② 中央巨点数式", ds:"超大点数+下方花色",
    f:(r,s,c)=>`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${c}">
      <div style="font-size:50px;font-weight:800;line-height:1">${r}</div><div style="font-size:24px;margin-top:2px">${s}</div></div>` },

  { nm:"③ 四角对称式", ds:"四角都标（正看反看均可）",
    f:(r,s,c)=>`<div style="position:absolute;top:4px;left:5px;font-size:14px;font-weight:800;color:${c};line-height:1">${r}<br>${s}</div>
      <div style="position:absolute;top:4px;right:5px;font-size:14px;font-weight:800;color:${c};line-height:1;transform:rotate(180deg)">${r}<br>${s}</div>
      <div style="position:absolute;bottom:4px;left:5px;font-size:14px;font-weight:800;color:${c};line-height:1;transform:rotate(180deg)">${r}<br>${s}</div>
      <div style="position:absolute;bottom:4px;right:5px;font-size:14px;font-weight:800;color:${c};line-height:1">${r}<br>${s}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:${c};opacity:.5">${s}</div>` },

  { nm:"④ 花体艺术字式", ds:"衬线斜体+彩色描边",
    f:(r,s,c)=>`<div style="position:absolute;top:5px;left:6px;font-size:15px;font-weight:700;color:${c}">${r} ${s}</div>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${c}">
      <div style="font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:46px;font-weight:700;text-shadow:1px 1px 0 rgba(0,0,0,.15)">${r}</div>
      <div style="font-size:26px;margin-top:1px">${s}</div></div>` },

  { nm:"⑤ 全幅花色式", ds:"花色占满+极小角标",
    f:(r,s,c)=>`<div style="position:absolute;top:3px;left:5px;font-size:11px;font-weight:800;color:${c}">${r}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:74px;color:${c}">${s}</div>` },

  { nm:"⑥ 点数环绕花色式", ds:"上点数·中花色·下大点数",
    f:(r,s,c)=>`<div style="position:absolute;top:6px;left:0;right:0;text-align:center;font-size:13px;font-weight:700;color:${c}">${r}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:36px;color:${c}">${s}</div>
      <div style="position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:26px;font-weight:800;color:${c}">${r}</div>` },

  { nm:"⑦ 像素方块字式", ds:"等宽字体+硬边框",
    f:(r,s,c)=>`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${c};font-family:'Courier New',monospace">
      <div style="font-size:36px;font-weight:700;letter-spacing:1px">${r}</div><div style="font-size:22px">${s}</div></div>` },

  { nm:"⑧ 极简线描式", ds:"细描边+大留白",
    f:(r,s,c)=>`<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:${c}">
      <div style="font-size:42px;font-weight:300">${r}</div><div style="font-size:22px;font-weight:300;margin-top:-2px">${s}</div></div>` },
];

const grid = document.getElementById("grid");
styles.forEach(st=>{
  const cell = document.createElement("div"); cell.className="cell";
  const row = document.createElement("div"); row.className="row";
  // 红牌 ♥K / 黑牌 ♠A / 牌背
  const mk = (inner, cls="")=>{ const d=document.createElement("div"); d.className="card "+cls; if(inner) d.innerHTML=inner; return d; };
  row.appendChild(mk(st.f("K","♥",RED)));
  row.appendChild(mk(st.f("A","♠",BLK)));
  row.appendChild(mk("","back")); // 统一牌背
  cell.appendChild(row);
  const nm=document.createElement("div"); nm.className="nm"; nm.textContent=st.nm; cell.appendChild(nm);
  const ds=document.createElement("div"); ds.className="ds"; ds.textContent=st.ds; cell.appendChild(ds);
  grid.appendChild(cell);
});
</script>
</body>
</html>
